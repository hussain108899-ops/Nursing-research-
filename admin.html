<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NRIF Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--t:#0a6e72;--tl:#14a8ad;--g:#c49a2a;--gl:#f0c84e;--dk:#0d1f22;--md:#1e3a3f;--tx:#f4f0ea;--mu:#a8bfc1;--b2:#0f2629;--rd:#e05252;--gr:#3abf6e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dk);color:var(--tx);min-height:100vh;}

/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(10,110,114,0.2),transparent),var(--dk);}
.lcard{background:rgba(255,255,255,0.04);border:1px solid rgba(20,168,173,0.25);border-radius:20px;padding:48px 40px;width:360px;text-align:center;}
.lcard h1{font-family:'Playfair Display',serif;color:var(--gl);margin-bottom:4px;font-size:1.6rem;}
.lcard p{color:var(--mu);font-size:0.85rem;margin-bottom:28px;}
.lcard input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:12px 16px;color:var(--tx);font-size:0.92rem;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px;transition:border-color 0.2s;}
.lcard input:focus{border-color:var(--tl);}
.lbtn{width:100%;background:var(--t);color:white;border:none;padding:13px;border-radius:8px;font-size:1rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;}
.lbtn:hover{background:var(--tl);color:var(--dk);}
.lerr{color:var(--rd);font-size:0.8rem;margin-top:10px;display:none;}

/* DASHBOARD */
#dash{display:none;}
.topbar{background:rgba(13,31,34,0.98);border-bottom:1px solid rgba(20,168,173,0.2);padding:0 20px;height:54px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.tlogo{font-family:'Playfair Display',serif;color:var(--gl);font-size:1rem;}
.tbadge{background:rgba(10,110,114,0.2);border:1px solid rgba(20,168,173,0.3);color:var(--tl);font-size:0.68rem;padding:3px 10px;border-radius:100px;}
.tacts{margin-left:auto;display:flex;gap:8px;}
.tbtn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--mu);padding:6px 14px;border-radius:6px;font-size:0.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;transition:all 0.2s;}
.tbtn:hover{border-color:var(--tl);color:var(--tl);}
.tbtn.gold{background:rgba(196,154,42,0.15);border-color:var(--g);color:var(--gl);}

.tabs{display:flex;gap:4px;padding:14px 20px 0;border-bottom:1px solid rgba(20,168,173,0.1);background:var(--b2);overflow-x:auto;}
.tab{padding:9px 16px;border-radius:8px 8px 0 0;font-size:0.82rem;font-weight:500;cursor:pointer;color:var(--mu);border:1px solid transparent;border-bottom:none;transition:all 0.2s;background:transparent;white-space:nowrap;}
.tab.active{background:var(--dk);border-color:rgba(20,168,173,0.2);color:var(--tl);}
.tpane{display:none;padding:24px 20px;}
.tpane.active{display:block;}

.card{background:rgba(255,255,255,0.03);border:1px solid rgba(20,168,173,0.15);border-radius:14px;padding:22px;margin-bottom:18px;}
.ctitle{font-family:'Playfair Display',serif;font-size:0.98rem;color:white;margin-bottom:14px;}

.fg{margin-bottom:14px;}
.fg label{display:block;font-size:0.72rem;font-weight:600;color:var(--mu);margin-bottom:5px;text-transform:uppercase;}
.fg input,.fg textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 12px;color:var(--tx);font-size:0.87rem;outline:none;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.sbtn{background:var(--t);color:white;border:none;padding:9px 22px;border-radius:8px;font-weight:600;cursor:pointer;}
.sbtn:hover{background:var(--tl);color:var(--dk);}

.spgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
.spitem{background:rgba(255,255,255,0.03);border:1px solid rgba(20,168,173,0.12);border-radius:12px;padding:14px;text-align:center;}
.spinput{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:5px 8px;color:white;font-size:0.75rem;margin-bottom:5px;outline:none;text-align:center;}
.arow{display:grid;grid-template-columns:150px 170px 1fr 34px;gap:8px;align-items:center;margin-bottom:7px;}
.ainput{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:7px 9px;color:white;font-size:0.78rem;outline:none;width:100%;}
.plist{display:flex;flex-direction:column;gap:8px;}
.pitem{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(20,168,173,0.1);border-radius:10px;padding:10px 14px;}
.pname{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:7px 10px;color:white;outline:none;}
#toast{position:fixed;bottom:20px;right:20px;background:rgba(13,31,34,0.97);border:1px solid rgba(20,168,173,0.3);color:var(--tl);padding:10px 20px;border-radius:100px;font-size:0.8rem;z-index:9999;display:none;}
.dbtn{background:rgba(224,82,82,0.12);color:var(--rd);border:1px solid rgba(224,82,82,0.3);padding:8px 16px;border-radius:8px;font-size:0.82rem;cursor:pointer;}
.xbtn{background:rgba(224,82,82,0.1);border:1px solid rgba(224,82,82,0.2);color:var(--rd);border-radius:6px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>

<div id="login">
  <div class="lcard">
    <h1>NRIF 2026</h1>
    <p>Admin Control Panel</p>
    <input type="text" id="lu" placeholder="Username"/>
    <input type="password" id="lp" placeholder="Password"/>
    <button class="lbtn" onclick="doLogin()">Login · دخول</button>
    <div class="lerr" id="lerr">Incorrect credentials</div>
  </div>
</div>

<div id="dash">
  <div class="topbar">
    <div class="tlogo">NRIF 2026</div>
    <span class="tbadge">Admin</span>
    <div class="tacts">
      <button class="tbtn" onclick="location.reload()">↺ Refresh</button>
      <button class="tbtn gold" onclick="showToast('💾 Auto-saved online!')">💾 Saved</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="sw('hero')">🏠 Hero & Settings</div>
    <div class="tab" onclick="sw('speakers')">👥 Speakers</div>
    <div class="tab" onclick="sw('agenda')">📅 Agenda</div>
    <div class="tab" onclick="sw('partners')">🤝 Partners</div>
  </div>

  <div class="tpane active" id="pane-hero">
    <div class="card">
      <div class="ctitle">✏️ Main Site Texts & Settings</div>
      <div class="fg"><label>Main Title (العنوان الرئيسي)</label><input type="text" id="htitle" placeholder="Nursing Research & Innovation Forum"/></div>
      <div class="fg"><label>Theme / Tagline (الشعار اللفظي)</label><textarea id="htheme" placeholder="Transforming Healthcare Through..."></textarea></div>
      <div class="fg"><label>Footer Copyright (الحقوق أسفل الصفحة)</label><input type="text" id="fcopy" placeholder="© 2026 College of Nursing · IAU"/></div>
      <button class="sbtn" onclick="saveHero()">Save Text & Settings</button>
    </div>
  </div>

  <div class="tpane" id="pane-speakers">
    <div class="card">
      <div class="ctitle">👥 Manage Speakers</div>
      <div class="spgrid" id="spgrid"></div>
      <div style="margin-top:16px; display:flex; gap:10px;">
        <button class="sbtn" onclick="saveSpeakers()">💾 Save Speakers</button>
        <button class="sbtn" style="background:#222;" onclick="addSpeaker()">+ Add Speaker</button>
      </div>
    </div>
  </div>

  <div class="tpane" id="pane-agenda">
    <div class="card">
      <div class="ctitle">📅 Forum Agenda</div>
      <div id="arows"></div>
      <div style="margin-top:12px; display:flex; gap:10px;">
        <button class="sbtn" onclick="saveAgenda()">💾 Save Agenda</button>
        <button class="sbtn" style="background:#222;" onclick="addAgRow()">+ Add Row</button>
      </div>
    </div>
  </div>

  <div class="tpane" id="pane-partners">
    <div class="card">
      <div class="ctitle">🤝 Strategic Partners</div>
      <div class="plist" id="plist"></div>
      <div style="margin-top:14px; display:flex; gap:10px;">
        <button class="sbtn" onclick="savePartners()">💾 Save Partners</button>
        <button class="sbtn" style="background:#222;" onclick="addPartner()">+ Add Partner</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbvGRvon0z2MbVJwLhfJvCl1XOv8rk3Oa_25cv8swh3QwZRfOSl7XuiLgv1N_TKbACaQbA/exec';
const CREDS = {u:'admin',p:'nrif2026'};

function doLogin(){
  if(document.getElementById('lu').value===CREDS.u && document.getElementById('lp').value===CREDS.p){
    document.getElementById('login').style.display='none';
    document.getElementById('dash').style.display='block';
    init();
  } else { document.getElementById('lerr').style.display='block'; }
}

const get=(k,d)=>JSON.parse(localStorage.getItem(k)||JSON.stringify(d));
const set=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

function sw(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tpane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+name).classList.add('active');
  event.target.classList.add('active');
}

function init(){
  loadHero(); loadSpeakers(); loadAgenda(); loadPartners();
}

async function sendToGoogleSheets(payload) {
  showToast('⏳ Syncing with Google Sheets...');
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'updateContent', ...payload })
    });
    showToast('💾 Successfully saved online!');
  } catch(e) { showToast('❌ Sync failed'); }
}

// Hero Text / Settings
function loadHero() {
  document.getElementById('htitle').value = localStorage.getItem('title') || 'Nursing Research & Innovation Forum';
  document.getElementById('htheme').value = localStorage.getItem('theme') || '';
  document.getElementById('fcopy').value = localStorage.getItem('footerCopy') || '';
}
function saveHero() {
  const t = document.getElementById('htitle').value;
  const th = document.getElementById('htheme').value;
  const f = document.getElementById('fcopy').value;
  localStorage.setItem('title', t); localStorage.setItem('theme', th); localStorage.setItem('footerCopy', f);
  sendToGoogleSheets({ settings: { title: t, theme: th, footerCopy: f } });
}

// Speakers Setup
const defSp = [{id:'TO',initials:'TO',name:'Prof. Taqwa Omar',role:'Member of Shura Council',org:'Keynote'}];
function loadSpeakers(){
  const sps=get('nrif_speakers',defSp);
  document.getElementById('spgrid').innerHTML=sps.map((s,i)=>`
    <div class="spitem">
      <input class="spinput" id="sn-${i}" value="${s.name}" placeholder="Name"/>
      <input class="spinput" id="sr-${i}" value="${s.role}" placeholder="Role"/>
      <input class="spinput" id="so-${i}" value="${s.org}" placeholder="Org"/>
      <button class="dbtn" style="font-size:0.7rem; width:100%;" onclick="rmSp(${i})">Remove</button>
    </div>`).join('');
}
function saveSpeakers(){
  const sps=get('nrif_speakers',defSp);
  sps.forEach((s,i)=>{
    s.name=document.getElementById('sn-'+i).value;
    s.role=document.getElementById('sr-'+i).value;
    s.org=document.getElementById('so-'+i).value;
  });
  set('nrif_speakers',sps);
  sendToGoogleSheets({ speakers: sps });
}
function addSpeaker(){ const sps=get('nrif_speakers',defSp); sps.push({id:'SP'+Date.now(),initials:'SP',name:'New Speaker',role:'',org:''}); set('nrif_speakers',sps); loadSpeakers(); }
function rmSp(i){ const sps=get('nrif_speakers',defSp); sps.splice(i,1); set('nrif_speakers',sps); loadSpeakers(); }

// Agenda Setup
const defAg = [{t:'08:00 AM',a:'Registration',d:'Welcome refreshments'}];
function loadAgenda(){
  const ag=get('nrif_agenda',defAg);
  document.getElementById('arows').innerHTML=ag.map((r,i)=>`
    <div class="arrow cscard" style="display:flex; gap:10px; margin-bottom:8px;">
      <input class="ainput" id="at-${i}" value="${r.t || r.time || ''}" placeholder="Time" style="width:140px;"/>
      <input class="ainput" id="aa-${i}" value="${r.a || r.activity || ''}" placeholder="Activity"/>
      <input class="ainput" id="ad-${i}" value="${r.d || r.details || ''}" placeholder="Details"/>
      <button class="xbtn" onclick="rmAg(${i})">✕</button>
    </div>`).join('');
}
function saveAgenda(){
  const ag=get('nrif_agenda',defAg);
  const formatted = [];
  ag.forEach((r,i)=>{
    const time = document.getElementById('at-'+i).value;
    const act = document.getElementById('aa-'+i).value;
    const det = document.getElementById('ad-'+i).value;
    formatted.push({ id: 'AG-'+i, time: time, activity: act, details: det });
  });
  set('nrif_agenda', formatted);
  sendToGoogleSheets({ agenda: formatted });
}
function addAgRow(){ const ag=get('nrif_agenda',defAg); ag.push({time:'',activity:'',details:''}); set('nrif_agenda',ag); loadAgenda(); }
function rmAg(i){ const ag=get('nrif_agenda',defAg); ag.splice(i,1); set('nrif_agenda',ag); loadAgenda(); }

// Partners Setup
const defP = [{id:'p1',name:'King Fahd Hospital'}];
function loadPartners(){
  const ps=get('nrif_partners',defP);
  document.getElementById('plist').innerHTML=ps.map((p,i)=>`
    <div class="pitem">
      <input class="pname" id="pn-${i}" value="${p.name}" placeholder="Partner Name"/>
      <button class="xbtn" onclick="rmP(${i})">✕</button>
    </div>`).join('');
}
function savePartners(){
  const ps=get('nrif_partners',defP);
  ps.forEach((p,i)=>{ p.name=document.getElementById('pn-'+i).value; });
  set('nrif_partners',ps);
  sendToGoogleSheets({ partners: ps });
}
function addPartner(){ const ps=get('nrif_partners',defP); ps.push({id:'P'+Date.now(),name:'New Partner'}); set('nrif_partners',ps); loadPartners(); }
function rmP(i){ const ps=get('nrif_partners',defP); ps.splice(i,1); set('nrif_partners',ps); loadPartners(); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none',2500);
}
</script>
</body>
</html>
